name: Supa-backup

on:
  push:
    branches: [ main, escritorio ]

  pull_request:
    branches: [ main, escritorio ]

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'

jobs:
  run_db_backup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Backup roles
        run: |
          supabase db dump \
            --db-url "$SUPABASE_DB_URL" \
            -f roles.sql \
            --role-only

      - name: Backup schema
        run: |
          supabase db dump \
            --db-url "$SUPABASE_DB_URL" \
            -f schema.sql

      - name: Backup data
        run: |
          supabase db dump \
            --db-url "$SUPABASE_DB_URL" \
            -f data.sql \
            --data-only \
            --use-copy

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Supabase backup