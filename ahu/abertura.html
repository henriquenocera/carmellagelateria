<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/checklist.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&display=swap" rel="stylesheet">

  <title>Checklist de Abertura</title>
</head>

<body>
  <div class="container">
    <h1>Checklist de Abertura - Loja Ahú</h1>
    <p id="timestamp"></p>


  </div>
  <form id="ahuOpen" onsubmit="/* event.preventDefault(); */ ahuOpenSubmit()">
    <div class="container">
      <div class="checklist-container">
        <div class="checklist-title">
          <span>1</span>
          <h2>Primeira Prioridade</h2>
        </div>
        <div class="checklist-body body-1">
          <div class="checkbox-wrapper">
            <input required class="inp-cbx" id="cbx-1" type="checkbox" style="display: none;" />
            <label class="cbx" for="cbx-1">
              <span>
                <svg width="12px" height="9px" viewbox="0 0 12 9">
                  <polyline points="1 5 4 8 11 1"></polyline>
                </svg>
              </span>
              <span>Bater Ponto</span>
            </label>
          </div>
          <div class="checkbox-wrapper">
            <input required class="inp-cbx" id="cbx-2" type="checkbox" style="display: none;" />
            <label class="cbx" for="cbx-2">
              <span>
                <svg width="12px" height="9px" viewbox="0 0 12 9">
                  <polyline points="1 5 4 8 11 1"></polyline>
                </svg>
              </span>
              <span>Limpar e Ligar Vitrine</span>
            </label>
          </div>
          <div class="checkbox-wrapper">
            <input required class="inp-cbx" id="cbx-3" type="checkbox" style="display: none;" />
            <label class="cbx" for="cbx-3">
              <span>
                <svg width="12px" height="9px" viewbox="0 0 12 9">
                  <polyline points="1 5 4 8 11 1"></polyline>
                </svg>
              </span>
              <span>Verificar Gelatos</span>
            </label>
          </div>
        </div>

      </div>
      <div class="checklist-container">
        <div class="checklist-title">
          <span>2</span>
          <h2>Outros</h2>
        </div>
        <div class="checklist-body body-2">
          <div class="checkbox-wrapper">
            <input required class="inp-cbx" id="cbx-4" type="checkbox" style="display: none;" />
            <label class="cbx" for="cbx-4">
              <span>
                <svg width="12px" height="9px" viewbox="0 0 12 9">
                  <polyline points="1 5 4 8 11 1"></polyline>
                </svg>
              </span>
              <span>Limpeza Interna da Loja</span>
            </label>
          </div>
          <div class="checkbox-wrapper">
            <input required class="inp-cbx" id="cbx-5" type="checkbox" style="display: none;" />
            <label class="cbx" for="cbx-5">
              <span>
                <svg width="12px" height="9px" viewbox="0 0 12 9">
                  <polyline points="1 5 4 8 11 1"></polyline>
                </svg>
              </span>
              <span>Reposição de Insumos na Loja</span>
            </label>
          </div>
          <div class="checkbox-wrapper">
            <input required class="inp-cbx" id="cbx-6" type="checkbox" style="display: none;" />
            <label class="cbx" for="cbx-6">
              <span>
                <svg width="12px" height="9px" viewbox="0 0 12 9">
                  <polyline points="1 5 4 8 11 1"></polyline>
                </svg>
              </span>
              <span>Ligar Máquina de Waffle (200º)</span>
            </label>
          </div>
        </div>

      </div>

      <button class="submit" type="submit">Enviar</button>
  </form>
  </div>


  <script src="index.js"></script>
</body>

</html>
